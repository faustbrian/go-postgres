name: PostgreSQL integration

on:
  push:
    branches: [main, develop]
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  postgres:
    name: PostgreSQL ${{ matrix.postgres }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: [14, 15, 16, 17, 18]
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up minimum Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.x
          cache: false
      - name: Run integration suite
        run: make integration POSTGRES_VERSION=${{ matrix.postgres }}

  race:
    name: PostgreSQL race suite
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up minimum Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.x
          cache: false
      - name: Run real PostgreSQL race suite
        run: go test -race -tags=integration -count=1 ./...
